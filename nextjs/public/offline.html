<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>离线 — 剧本杀AI店员助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px;
    }
    .card {
      background: white; border-radius: 16px; padding: 48px 32px;
      max-width: 400px; width: 100%; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      width: 64px; height: 64px; margin: 0 auto 24px;
      background: #eff6ff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; color: #3b82f6; }
    h1 { font-size: 18px; color: #1f2937; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b7280; margin-bottom: 24px; line-height: 1.6; }
    .status { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .status span { font-size: 13px; color: #ef4444; font-weight: 500; }
    button {
      width: 100%; padding: 12px; border: none; border-radius: 12px;
      background: #2563eb; color: white; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
    button:active { background: #1e40af; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M18.364 5.636a9 9 0 010 12.728m-3.536-9.192a5 5 0 010 7.07m-6.364-9.899L5.636 9.171m12.728 0L15.536 6.343" />
      </svg>
    </div>
    <h1>网络连接已断开</h1>
    <p>AI店员助手需要网络才能正常工作。<br />请检查网络连接后重试。</p>
    <div class="status">
      <div class="dot"></div>
      <span>离线中</span>
    </div>
    <button onclick="location.href='/'">回到首页</button>
  </div>
  <script>
    // 网络恢复时自动刷新
    window.addEventListener("online", () => location.href = "/");
  </script>
</body>
</html>
